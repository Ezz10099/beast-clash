<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101420" />
    <meta name="application-name" content="Pixel Mage" />
    <title>Pixel Mage</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="game-card">
        <header class="top-bar">
          <div>
            <p class="eyebrow">Release Run</p>
            <h1>Pixel Mage</h1>
          </div>
          <button
            id="menuButton"
            class="small-button"
            type="button"
            aria-haspopup="dialog"
            aria-controls="menuPanel"
          >Options</button>
        </header>

        <div class="game-stage">
          <canvas
            id="game"
            width="320"
            height="480"
            aria-label="Pixel Mage game canvas"
            aria-describedby="controlHint"
          ></canvas>
          <section id="upgradePanel" class="upgrade-panel" aria-labelledby="upgradeTitle" hidden>
            <p class="eyebrow">Wave Cleared</p>
            <h2 id="upgradeTitle">Choose one spell upgrade</h2>
            <p class="upgrade-help">The choice lasts for this run.</p>
            <div id="upgradeChoices" class="upgrade-choices"></div>
          </section>
          <section
            id="menuPanel"
            class="menu-panel"
            role="dialog"
            aria-modal="true"
            aria-labelledby="menuTitle"
            hidden
          >
            <p id="menuEyebrow" class="eyebrow">Options</p>
            <h2 id="menuTitle">Game Settings</h2>
            <p id="menuStatus" class="menu-status">Settings save automatically.</p>
            <div class="settings-grid" aria-label="Feedback settings">
              <button id="soundButton" class="option-button" type="button" aria-pressed="true">Sound: On</button>
              <button id="hapticsButton" class="option-button" type="button" aria-pressed="true">Haptics: On</button>
            </div>
            <div class="menu-actions">
              <button id="resumeButton" class="menu-primary" type="button">Close</button>
              <button id="newRunButton" class="menu-secondary" type="button">Start New Run</button>
            </div>
          </section>
        </div>

        <section class="hud" aria-live="polite">
          <span id="healthText">HP 3</span>
          <span id="waveText">5 Waves</span>
          <span id="scoreText">Best 0</span>
        </section>

        <p id="controlHint" class="control-hint">Drag in the arena to move · Spells cast automatically</p>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
