<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Game 0 — Pixel Mage</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="game-card">
        <header class="top-bar">
          <div>
            <p class="eyebrow">Game 0</p>
            <h1>Pixel Mage</h1>
          </div>
          <button id="restartButton" class="small-button" type="button">Restart</button>
        </header>

        <canvas id="game" width="320" height="480" aria-label="Pixel Mage game canvas"></canvas>

        <section class="hud" aria-live="polite">
          <span id="healthText">HP 3</span>
          <span id="goalText">Defeat the slimes</span>
        </section>

        <section class="controls" aria-label="Touch controls">
          <div class="dpad">
            <button data-key="up" type="button">▲</button>
            <div>
              <button data-key="left" type="button">◀</button>
              <button data-key="down" type="button">▼</button>
              <button data-key="right" type="button">▶</button>
            </div>
          </div>
          <button class="fire" data-key="fire" type="button">Fire</button>
        </section>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
