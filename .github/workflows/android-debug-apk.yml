name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/android-debug-apk.yml'
      - 'android/**'
      - 'assets/android-source/**'
      - 'capacitor.config.json'
      - 'game.js'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'style.css'

permissions:
  contents: read
  statuses: write

concurrency:
  group: pixel-mage-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Report build started
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \
            --data "{\"state\":\"pending\",\"target_url\":\"$RUN_URL\",\"description\":\"Android debug APK build started\",\"context\":\"android-debug-apk\"}"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager 'platforms;android-36' 'build-tools;36.0.0'

      - name: Install pinned dependencies
        run: npm ci --no-audit --no-fund

      - name: Run automated evidence gate
        run: npm run evidence

      - name: Upload automated evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pixel-mage-evidence
          path: artifacts/evidence/evidence-report.*
          if-no-files-found: warn
          retention-days: 14

      - name: Verify and sync Android project
        run: npm run android:sync

      - name: Build debug APK
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug

      - name: Verify APK output
        run: test -s android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-mage-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Report final build result
        if: ${{ always() }}
        env:
          BUILD_RESULT: ${{ job.status }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          state="$BUILD_RESULT"
          if [ "$state" = "cancelled" ]; then
            state="error"
          fi

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \
            --data "{\"state\":\"$state\",\"target_url\":\"$RUN_URL\",\"description\":\"Android debug APK build $BUILD_RESULT\",\"context\":\"android-debug-apk\"}"
