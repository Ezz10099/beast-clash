name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/android-debug-apk.yml'
      - 'android/**'
      - 'assets/android-source/**'
      - 'capacitor.config.json'
      - 'game.js'
      - 'index.html'
      - 'style.css'
      - 'localization.css'
      - 'localization.js'
      - 'touch-controls.js'
      - 'phone-polish.css'
      - 'phone-polish.js'
      - 'arena-fx.css'
      - 'arena-fx.js'
      - 'enemy-variety.css'
      - 'enemy-variety.js'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'

permissions:
  contents: read
  statuses: write

concurrency:
  group: pixel-mage-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Report build started
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \
            --data "{\"state\":\"pending\",\"target_url\":\"$RUN_URL\",\"description\":\"Android debug APK build started\",\"context\":\"android-debug-apk\"}"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager 'platforms;android-36' 'build-tools;36.0.0'

      - name: Install pinned dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify workflow contract
        run: npm run workflow:check

      - name: Verify localization
        run: npm run localization:check

      - name: Verify controls
        run: npm run controls:check

      - name: Verify phone layout
        run: npm run polish:check

      - name: Verify arena feedback
        run: npm run fx:check

      - name: Verify enemy variety
        run: npm run enemy:check

      - name: Verify Cell Runner
        run: npm run cell:check

      - name: Verify Test Launcher
        run: npm run launcher:check

      - name: Verify core gameplay
        run: node --check game.js && node scripts/check.mjs

      - name: Build release bundle
        run: npm run build

      - name: Verify release bundle
        run: |
          mkdir -p artifacts/diagnostics
          set -o pipefail
          node scripts/check-build.mjs 2>&1 | tee artifacts/diagnostics/build-check.log

      - name: Upload release diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pixel-mage-build-diagnostics
          path: artifacts/diagnostics/build-check.log
          if-no-files-found: warn
          retention-days: 7

      - name: Verify runtime size
        run: npm run size:check

      - name: Build Android artwork
        run: npm run assets:android

      - name: Verify Android configuration
        run: node scripts/check-android.mjs

      - name: Run automated evidence gate
        run: npm run evidence

      - name: Upload automated evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pixel-mage-evidence
          path: artifacts/evidence/evidence-report.*
          if-no-files-found: warn
          retention-days: 14

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug

      - name: Verify APK output
        run: test -s android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-mage-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Report final build result
        if: ${{ always() }}
        env:
          BUILD_RESULT: ${{ job.status }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          state="$BUILD_RESULT"
          if [ "$state" = "cancelled" ]; then
            state="error"
          fi

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \
            --data "{\"state\":\"$state\",\"target_url\":\"$RUN_URL\",\"description\":\"Android debug APK build $BUILD_RESULT\",\"context\":\"android-debug-apk\"}"
