name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/android-debug-apk.yml'
      - 'android/**'
      - 'assets/android-source/**'
      - 'capacitor.config.json'
      - 'game.js'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'style.css'

permissions:
  contents: read

concurrency:
  group: pixel-mage-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager 'platforms;android-36' 'build-tools;36.0.0'

      - name: Install pinned dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify and sync Android project
        run: npm run android:sync

      - name: Build debug APK
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug

      - name: Verify APK output
        run: test -s android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-mage-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
